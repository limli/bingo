<!DOCTYPE html>
<!-- Bingo Caller — Neon Casino edition. -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BINGO · Neon Casino</title>
<style>
  :root {
    --gold: #ffd76a;
    --gold-deep: #c9952a;
    --neon: #ff2d75;
    --neon2: #25e0ff;
    --felt: #0a3d2e;
    --ink: #04140f;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    color: #f5f5f5;
    background:
      radial-gradient(1200px 700px at 50% -10%, #14543f 0%, var(--felt) 45%, var(--ink) 100%);
    min-height: 100%;
    overflow-x: hidden;
  }
  /* faint playing-card-suit motif echoing guesshighlow.png */
  body::before {
    content: "♠ ♥ ♦ ♣ ♣ ♦ ♥ ♠ ♠ ♥ ♦ ♣ ♣ ♦ ♥ ♠ ♠ ♥ ♦ ♣ ♣ ♦ ♥ ♠ ♠ ♥ ♦ ♣ ♣ ♦ ♥ ♠ ♠ ♥ ♦ ♣ ♣ ♦ ♥ ♠ ♠ ♥ ♦ ♣ ♣ ♦ ♥ ♠";
    position: fixed; inset: -10% -5%; z-index: 0;
    font-size: 64px; line-height: 2.4; letter-spacing: 36px;
    color: #ffffff; opacity: 0.035; transform: rotate(-18deg);
    pointer-events: none; word-spacing: 28px; user-select: none;
  }
  .wrap { position: relative; z-index: 1; max-width: 1180px; margin: 0 auto; padding: 28px 20px 60px; }

  header { text-align: center; margin-bottom: 22px; }
  .title {
    font-size: clamp(40px, 8vw, 86px);
    font-weight: 900; letter-spacing: 0.08em; margin: 0;
    background: linear-gradient(180deg, #fff 0%, var(--gold) 55%, var(--gold-deep) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 2px 0 #00000060);
  }
  .title .glow {
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 18px rgba(255,45,117,.0);
  }
  .subtitle { margin: 4px 0 0; color: #bfe9d4; letter-spacing: .35em; font-size: 12px; text-transform: uppercase; }

  .stage { display: grid; grid-template-columns: 1.15fr 1fr; gap: 26px; align-items: start; }
  @media (max-width: 880px) { .stage { grid-template-columns: 1fr; } }

  /* ---- Draw panel ---- */
  .panel {
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    border: 1px solid rgba(255,215,106,.28);
    border-radius: 22px; padding: 22px;
    box-shadow: 0 20px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08);
    backdrop-filter: blur(4px);
  }
  .ball-stage { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .ball {
    width: clamp(180px, 42vw, 260px); height: clamp(180px, 42vw, 260px);
    border-radius: 50%; display: grid; place-items: center; align-content: center; position: relative;
    background:
      radial-gradient(circle at 34% 30%, #fff7da 0%, var(--gold) 26%, var(--gold-deep) 64%, #7a5410 100%);
    box-shadow:
      0 0 0 6px rgba(255,255,255,.06),
      0 0 40px rgba(255,45,117,.55),
      0 0 80px rgba(37,224,255,.30),
      inset -16px -22px 44px rgba(0,0,0,.45),
      inset 12px 14px 30px rgba(255,255,255,.55);
    transition: transform .12s ease;
  }
  .ball::after { /* shine */
    content: ""; position: absolute; top: 14%; left: 20%; width: 34%; height: 24%;
    background: radial-gradient(closest-side, rgba(255,255,255,.85), transparent);
    border-radius: 50%; filter: blur(2px);
  }
  .ball .ball-letter {
    font-size: clamp(24px, 6vw, 42px); font-weight: 900; color: #7a5410;
    letter-spacing: .14em; line-height: 1; text-shadow: 0 1px 0 rgba(255,255,255,.5);
  }
  .ball .num {
    font-size: clamp(66px, 16vw, 116px); font-weight: 900; color: #2b1a02;
    text-shadow: 0 2px 0 rgba(255,255,255,.4); line-height: 1;
  }
  .ball.spin { animation: spin .7s cubic-bezier(.2,.8,.2,1); }
  @keyframes spin {
    0%   { transform: rotate(-220deg) scale(.4); }
    70%  { transform: rotate(12deg)  scale(1.08); }
    100% { transform: rotate(0)      scale(1); }
  }
  .ball.empty { filter: grayscale(.7) brightness(.7); }
  .ball.empty .num { font-size: clamp(20px,5vw,30px); }

  .btn-row { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
  button {
    font-family: inherit; cursor: pointer; border: none; border-radius: 999px;
    font-weight: 800; letter-spacing: .04em; transition: transform .08s, box-shadow .2s, filter .2s;
  }
  button:active { transform: translateY(2px); }
  .draw-btn {
    font-size: clamp(20px, 4vw, 26px); padding: 16px 42px; color: #2b1a02;
    background: linear-gradient(180deg, #fff0bd, var(--gold) 50%, var(--gold-deep));
    box-shadow: 0 10px 26px rgba(255,215,106,.40), inset 0 1px 0 rgba(255,255,255,.7);
  }
  .draw-btn:hover { filter: brightness(1.06); box-shadow: 0 14px 34px rgba(255,215,106,.55); }
  .draw-btn:disabled { filter: grayscale(.8) brightness(.6); cursor: not-allowed; box-shadow: none; }
  .mini {
    font-size: 14px; padding: 10px 18px; color: #eafff5;
    background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.18);
  }
  .mini:hover { background: rgba(255,255,255,.14); }

  /* ---- stats ---- */
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 20px; }
  .stat {
    text-align: center; padding: 12px 6px; border-radius: 14px;
    background: rgba(0,0,0,.25); border: 1px solid rgba(255,255,255,.10);
  }
  .stat b { display: block; font-size: 28px; color: var(--gold); }
  .stat span { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: #a9d8c5; }

  /* ---- history ---- */
  .history-label { margin: 22px 0 8px; font-size: 11px; letter-spacing: .22em; text-transform: uppercase; color: #a9d8c5; }
  .history { display: flex; flex-wrap: wrap; gap: 8px; min-height: 44px; }
  .chip {
    width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center;
    font-weight: 800; font-size: 14px; color: #2b1a02;
    background: radial-gradient(circle at 34% 30%, #fff, var(--neon2) 70%, #0b8aa3);
    box-shadow: 0 4px 12px rgba(37,224,255,.4); animation: pop .35s ease;
  }
  .chip:first-child { background: radial-gradient(circle at 34% 30%, #fff, var(--neon) 70%, #9c1144); box-shadow: 0 4px 16px rgba(255,45,117,.55); }
  @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

  /* ---- board (B-I-N-G-O columns) ---- */
  .board-head { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 6px; }
  .bh {
    text-align: center; font-weight: 900; font-size: clamp(22px, 4.4vw, 34px);
    color: #2b1a02; border-radius: 10px; padding: 8px 0; letter-spacing: .04em;
    background: radial-gradient(circle at 40% 30%, #fff7da, var(--gold) 58%, var(--gold-deep));
    box-shadow: 0 0 16px rgba(255,215,106,.55), inset 0 1px 0 rgba(255,255,255,.6);
  }
  .board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .cell {
    padding: 9px 0; border-radius: 10px; display: grid; place-items: center;
    font-weight: 800; font-size: clamp(15px, 2.6vw, 22px); cursor: pointer; user-select: none;
    color: #cfeede; background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.10); transition: transform .12s, background .2s, color .2s, box-shadow .2s;
  }
  .cell:hover { transform: translateY(-2px); background: rgba(255,255,255,.10); }
  .cell.called {
    color: #2b1a02; border-color: transparent;
    background: radial-gradient(circle at 34% 30%, #fff7da, var(--gold) 60%, var(--gold-deep));
    box-shadow: 0 0 14px rgba(255,215,106,.6), inset 0 0 8px rgba(0,0,0,.2);
  }
  .cell.justdrawn { animation: flash .8s ease; box-shadow: 0 0 0 3px var(--neon), 0 0 22px var(--neon); }
  @keyframes flash {
    0%,100% { box-shadow: 0 0 0 3px var(--neon), 0 0 22px var(--neon); }
    50%     { box-shadow: 0 0 0 6px var(--neon2), 0 0 30px var(--neon2); }
  }

  .footer { text-align: center; margin-top: 30px; color: #6fae97; font-size: 12px; letter-spacing: .1em; }

  /* confetti */
  .confetti { position: fixed; top: -12px; width: 10px; height: 14px; z-index: 5; pointer-events: none; border-radius: 2px; }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

  /* Fit the whole board on screen (desktop) — no page scrolling */
  @media (min-width: 881px) {
    html, body { height: 100%; overflow: hidden; }
    .wrap { height: 100vh; display: flex; flex-direction: column; padding: 14px 20px 12px; overflow: hidden; }
    header { margin-bottom: 8px; }
    .title { font-size: clamp(28px, 4.2vw, 52px); }
    .subtitle { font-size: 11px; }
    .stage { flex: 1 1 auto; min-height: 0; grid-template-rows: minmax(0, 1fr); align-items: stretch; gap: 18px; }
    .panel { padding: 16px; }
    .board-panel { display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
    .board { flex: 1 1 auto; min-height: 0; grid-template-rows: repeat(15, minmax(0, 1fr)); gap: 5px; }
    .cell { padding: 0; min-height: 0; }
    .footer { margin-top: 8px; }
    .stage > .panel:not(.board-panel) { overflow: auto; }  /* right column scrolls if a short viewport can't fit it */
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 class="title">BINGO</h1>
      <p class="subtitle">Neon Casino &nbsp;·&nbsp; Caller</p>
    </header>

    <div class="stage">
      <!-- left: board -->
      <section class="panel board-panel">
        <div class="board-head" id="boardHead"></div>
        <div class="board" id="board"></div>
      </section>

      <!-- right: draw + stats + history -->
      <section class="panel">
        <div class="ball-stage">
          <div class="ball" id="ball"><span class="ball-letter" id="ballLetter"></span><span class="num" id="ballNum">—</span></div>
          <div class="btn-row">
            <button class="draw-btn" id="drawBtn" onclick="draw()">DRAW</button>
          </div>
          <div class="btn-row">
            <button class="mini" onclick="undo()">↩ Undo</button>
            <button class="mini" onclick="resetGame()">⟲ Reset</button>
            <button class="mini" id="muteBtn" onclick="toggleMute()">🔊 Sound</button>
          </div>
        </div>

        <div class="stats">
          <div class="stat"><b id="sLast">—</b><span>Last</span></div>
          <div class="stat"><b id="sCalled">0</b><span>Called</span></div>
          <div class="stat"><b id="sLeft">75</b><span>Remaining</span></div>
        </div>

        <p class="history-label">Recent draws</p>
        <div class="history" id="history"></div>
      </section>
    </div>

    <p class="footer">Click any number to mark it manually</p>
  </div>

<script>
  const KEY = "bingo:neon";
  const MAX = 75;
  let called = [];     // ordered list of drawn numbers (history is derived)
  let manual = new Set(); // numbers toggled on by hand (not via draw)
  let muted = false;

  const $ = id => document.getElementById(id);

  const LETTERS = ["B", "I", "N", "G", "O"];
  const letterOf = n => LETTERS[Math.floor((n - 1) / 15)]; // 1-15→B, 16-30→I, …
  const label = n => letterOf(n) + "-" + n;                // e.g. "B-12"

  function calledSet() { return new Set([...called, ...manual]); }

  function buildBoard() {
    $("boardHead").innerHTML = LETTERS.map(l => `<div class="bh">${l}</div>`).join("");
    const b = $("board");
    b.innerHTML = "";
    // 5 lettered columns × 15 rows; CSS grid fills row-major
    for (let r = 0; r < 15; r++) {
      for (let col = 0; col < 5; col++) {
        const n = col * 15 + r + 1;
        const c = document.createElement("div");
        c.className = "cell";
        c.id = "cell" + n;
        c.textContent = n;
        c.onclick = () => toggleManual(n);
        b.appendChild(c);
      }
    }
  }

  function toggleManual(n) {
    if (called.includes(n)) { // un-draw a drawn number via click
      called = called.filter(x => x !== n);
    } else if (manual.has(n)) {
      manual.delete(n);
    } else {
      manual.add(n);
    }
    render(); save();
  }

  function draw() {
    const taken = calledSet();
    const pool = [];
    for (let n = 1; n <= MAX; n++) if (!taken.has(n)) pool.push(n);
    if (!pool.length) return;
    const pick = pool[Math.floor(Math.random() * pool.length)];
    called.push(pick);
    render();
    animateDraw(pick);
    sound();
    save();
  }

  function undo() {
    if (!called.length) return;
    called.pop();
    render(); save();
  }

  function resetGame() {
    called = []; manual.clear();
    $("ballNum").textContent = "—"; $("ballLetter").textContent = "";
    render(); save();
  }

  function render() {
    const taken = calledSet();
    for (let n = 1; n <= MAX; n++) {
      const c = $("cell" + n);
      c.classList.toggle("called", taken.has(n));
      c.classList.remove("justdrawn");
    }
    const last = called[called.length - 1];
    $("sLast").textContent = last != null ? label(last) : "—";
    $("sCalled").textContent = taken.size;
    $("sLeft").textContent = MAX - taken.size;
    if (last != null) {
      $("ballLetter").textContent = letterOf(last);
      $("ballNum").textContent = last;
      $("ball").classList.remove("empty");
    }

    // history strip — most recent first, up to 10
    const h = $("history"); h.innerHTML = "";
    [...called].slice(-10).reverse().forEach(n => {
      const chip = document.createElement("div");
      chip.className = "chip"; chip.textContent = letterOf(n) + n;
      h.appendChild(chip);
    });

    const full = taken.size >= MAX;
    $("drawBtn").disabled = full;
    if (full) { $("ball").classList.add("empty"); $("ballLetter").textContent = ""; $("ballNum").textContent = "ALL DRAWN"; }
  }

  function animateDraw(pick) {
    const ball = $("ball"), num = $("ballNum");
    $("ballLetter").textContent = letterOf(pick);
    num.textContent = pick;
    ball.classList.remove("spin"); void ball.offsetWidth; ball.classList.add("spin");
    const cell = $("cell" + pick);
    cell.classList.remove("justdrawn"); void cell.offsetWidth; cell.classList.add("justdrawn");
    confetti();
  }

  /* ---------- Web Audio: blip during spin, chime on settle ---------- */
  let audioCtx;
  function sound() {
    if (muted) return;
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const t0 = audioCtx.currentTime;
      // rattle blips
      for (let i = 0; i < 5; i++) {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = "square"; o.frequency.value = 300 + Math.random() * 500;
        g.gain.value = 0.0001; o.connect(g); g.connect(audioCtx.destination);
        const t = t0 + i * 0.09;
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.08, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);
        o.start(t); o.stop(t + 0.08);
      }
      // settle chime
      [659.25, 987.77].forEach((f, i) => {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = "sine"; o.frequency.value = f;
        o.connect(g); g.connect(audioCtx.destination);
        const t = t0 + 0.5 + i * 0.04;
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.18, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
        o.start(t); o.stop(t + 0.55);
      });
    } catch (e) {}
  }

  function toggleMute() {
    muted = !muted;
    $("muteBtn").textContent = muted ? "🔇 Muted" : "🔊 Sound";
  }

  function confetti() {
    const colors = ["#ff2d75", "#25e0ff", "#ffd76a", "#ffffff"];
    for (let i = 0; i < 26; i++) {
      const c = document.createElement("div");
      c.className = "confetti";
      c.style.left = Math.random() * 100 + "vw";
      c.style.background = colors[i % colors.length];
      c.style.animation = `fall ${1 + Math.random() * 0.8}s ease-in forwards`;
      c.style.animationDelay = Math.random() * 0.2 + "s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2200);
    }
  }

  /* ---------- persistence ---------- */
  function save() {
    try { localStorage.setItem(KEY, JSON.stringify({ called, manual: [...manual] })); } catch (e) {}
  }
  function load() {
    try {
      const d = JSON.parse(localStorage.getItem(KEY) || "{}");
      if (Array.isArray(d.called)) called = d.called;
      if (Array.isArray(d.manual)) manual = new Set(d.manual);
    } catch (e) {}
  }

  buildBoard(); load(); render();
</script>
</body>
</html>
